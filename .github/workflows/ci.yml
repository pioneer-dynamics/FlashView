name: CI

# After merging, configure branch protection in GitHub repo settings:
# Settings > Branches > Add rule for master and develop:
#   - Enable "Require status checks to pass before merging"
#   - Add "php-tests", "cli-tests", and "crypto-tests" as required checks

on:
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  php-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, sqlite3, dom, curl, bcmath, intl
          tools: composer
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Build frontend assets
        run: npm ci && npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --no-interaction

      - name: Run tests
        run: php artisan test

  crypto-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: tools/flashview-crypto

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'tools/flashview-crypto/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      APP_ENV: testing
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      DB_DATABASE: database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, sqlite3, dom, curl, bcmath, intl
          tools: composer
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate:fresh --no-interaction

      - name: Start application server
        run: php artisan serve --port=8000 &> /tmp/laravel-serve.log &

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/login | grep -qE "^2"; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          cat /tmp/laravel-serve.log
          exit 1

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  cli-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            tools/flashview-cli/package-lock.json
            tools/flashview-crypto/package-lock.json

      - name: Install crypto package dependencies
        working-directory: tools/flashview-crypto
        run: npm ci

      - name: Install CLI dependencies
        working-directory: tools/flashview-cli
        run: npm ci

      - name: Run CLI tests
        working-directory: tools/flashview-cli
        run: npm test
