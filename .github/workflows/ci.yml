name: CI

# After merging, configure branch protection in GitHub repo settings:
# Settings > Branches > Add rule for master and develop:
#   - Enable "Require status checks to pass before merging"
#   - Add "php-tests" and "cli-tests" as required checks

on:
  pull_request:
    branches: [master, develop]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  php-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, sqlite3, dom, curl, bcmath, intl
          tools: composer
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Create Vite manifest stub
        run: |
          mkdir -p public/build
          grep -roh "Vite::asset('[^']*')" resources/views/ | sed "s/Vite::asset('//;s/')//" | sort -u | php -r '
            $manifest = [];
            while ($line = fgets(STDIN)) {
              $asset = trim($line);
              if ($asset) $manifest[$asset] = ["file" => $asset, "src" => $asset];
            }
            file_put_contents("public/build/manifest.json", json_encode($manifest, JSON_PRETTY_PRINT));
          '

      - name: Run migrations
        run: php artisan migrate --no-interaction

      - name: Run tests
        run: php artisan test

  cli-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: tools/flashview-cli

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'tools/flashview-cli/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
